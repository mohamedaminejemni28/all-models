  output_train_file: "data/processed/flatfoot_control_older_2024_train.xlsx"
  output_test_file: "data/processed/flatfoot_control_older_2024_test.xlsx"


SFS:
  dataset_train_file: "data/processed/flatfoot_control_older_2024_train.xlsx"
  dataset_test_file: "data/processed/flatfoot_control_older_2024_test.xlsx"

